name: wd-contract-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run contract and harness tests
        run: |
          python -m pytest -q tests/contracts tests/harness tests/test_training_corpus_upload.py

      - name: Run prompt/schema alignment check
        run: |
          python scripts/check_prompt_schema_alignment.py

      - name: Enforce docs-as-gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            python scripts/check_docs_as_gate.py --base-ref "origin/${{ github.base_ref }}"
          else
            python scripts/check_docs_as_gate.py --base-ref "HEAD~1"
          fi
